name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install llama-cpp-python CPU-only (no Metal/CUDA)
          CMAKE_ARGS="" pip install llama-cpp-python==0.2.76
          pip install -r requirements.txt
          pip install pytest

      - name: Verify imports
        run: |
          python -c "
          from ingestion import DocumentIngester
          from indexing import RAGIndexManager
          from inference import LLMInferenceManager
          from formatter import KnowledgeFormatter
          print('All imports OK')
          "

      - name: Run tests
        run: |
          python -m pytest tests/test_formatter.py tests/test_workspaces.py -v
